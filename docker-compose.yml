services:
  server:
    build: .
    image: connect-four
    ports:
      - "8080:8080"

  manage-github:
    build:
      context: .
      dockerfile: tools/Dockerfile
    image: connect-four-manage-github
    env_file: .env
    environment:
      - MANAGE_GITHUB_INTERVAL=300
    volumes:
      - manage-github-work:/work
    restart: unless-stopped

volumes:
  manage-github-work:
